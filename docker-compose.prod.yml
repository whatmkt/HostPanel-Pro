# HostPanel Pro - Production Docker Compose
# Use with: docker compose -f docker-compose.prod.yml up -d
# Requires: .env file with production secrets, SSL certificates, persistent volumes

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hostpanel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hostpanel}
      POSTGRES_USER: ${DB_USER:-hostpanel}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --locale=en_US.UTF-8
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - hostpanel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hostpanel} -d ${DB_NAME:-hostpanel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: hostpanel-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - hostpanel
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: hostpanel-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-hostpanel}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-hostpanel}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      API_PORT: 3001
      AGENT_URL: http://agent:4000
      AGENT_SECRET: ${AGENT_SECRET}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hostpanel
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    container_name: hostpanel-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-hostpanel}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-hostpanel}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AGENT_URL: http://agent:4000
      AGENT_SECRET: ${AGENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hostpanel
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    container_name: hostpanel-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - hostpanel
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  agent:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.mock-agent
    container_name: hostpanel-agent
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AGENT_PORT: 4000
      AGENT_SECRET: ${AGENT_SECRET}
      AGENT_MODE: ${AGENT_MODE:-real}
    ports:
      - "127.0.0.1:4000:4000"
    networks:
      - hostpanel
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  nginx:
    image: nginx:1.25-alpine
    container_name: hostpanel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/hostpanel.conf:/etc/nginx/conf.d/default.conf:ro
      - hostpanel-nginx-logs:/var/log/nginx
      - hostpanel-ssl:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - hostpanel
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  hostpanel-nginx-logs:
    driver: local
  hostpanel-ssl:
    driver: local

networks:
  hostpanel:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16